{% extends "base.html" %}
{% block title %}检测 · 数据质量监测平台{% endblock %}
{% block content %}
<h1>运行检测</h1>

<div class="grid">
  <article>
    <header><strong>📁 使用 demo 数据</strong></header>
    <form method="post" action="/checks/run">
      <label>数据集
        <select name="dataset" required>
          {% for d in datasets %}
          <option value="{{ d.name }}">{{ d.name }}</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit">运行检测</button>
    </form>
    <p><small>将使用 <code>data/generated/&lt;name&gt;.csv</code> 与 <code>data/rulesets/&lt;name&gt;_rules.yaml</code></small></p>
  </article>

  <article>
    <header><strong>📤 上传 CSV/Excel</strong></header>
    <form method="post" action="/uploads" enctype="multipart/form-data">
      <label>数据文件
        <input type="file" name="file" accept=".csv,.txt,.xls,.xlsx,.xlsm" required>
      </label>
      <label>规则集
        <select name="ruleset" required>
          {% for r in rulesets %}
          <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit">上传并检测</button>
    </form>
    <p><small>上传文件将保存到 <code>data/uploads/</code></small></p>
  </article>
</div>
{% endblock %}
